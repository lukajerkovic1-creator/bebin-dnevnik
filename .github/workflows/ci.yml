name: Android CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 14742923
          packages: 'platform-tools platforms;android-37.0 build-tools;37.0.0'
      - uses: gradle/actions/setup-gradle@v4
      - name: Provjeri Gradle konfiguraciju
        run: ./gradlew help --warning-mode=all
      - name: Format, statička analiza, lint i unit testovi
        run: ./gradlew :app:verifySafetyInvariants :app:formatCheck :app:detekt :app:lintDebug :app:testDebugUnitTest :app:compileDebugAndroidTestKotlin
      - name: Izgradi debug APK
        run: ./gradlew :app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: BebinDnevnik-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Spremi izvještaje pri neuspjehu
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: izvjestaji-quality
          path: |
            app/build/reports/**
            app/build/test-results/**

  instrumentation-api29:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 14742923
          packages: 'platform-tools platforms;android-37.0 build-tools;37.0.0'
      - uses: gradle/actions/setup-gradle@v4
      - name: Omogući hardversko ubrzanje emulatora
        run: sudo chmod 666 /dev/kvm
      - name: Instrumentation i Compose UI testovi na Androidu 10
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device
            timeout 300 bash -c 'until [ "$(adb shell getprop sys.boot_completed | tr -d "\r")" = "1" ] && [ "$(adb shell getprop ro.build.version.sdk | tr -d "\r")" = "29" ] && adb shell cmd package list packages >/dev/null 2>&1; do sleep 5; done'
            ./gradlew :app:connectedDebugAndroidTest
      - name: Spremi instrumentation izvještaje pri neuspjehu
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: izvjestaji-instrumentation-api29
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
